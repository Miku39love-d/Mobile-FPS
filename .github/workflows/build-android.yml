name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install Android components
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34"
          ln -sf $ANDROID_HOME/build-tools/34.0.0/* $ANDROID_HOME/build-tools/ 2>/dev/null || true

      - name: Download Godot 4.4
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          mv Godot_v4.4-stable_linux.x86_64 godot
          chmod +x godot

      - name: Download and Install Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.4.stable
          cd /tmp
          unzip -q templates.tpz "templates/android_debug.apk" "templates/android_release.apk"
          cp /tmp/templates/android_debug.apk ~/.local/share/godot/export_templates/4.4.stable/android_debug.apk
          cp /tmp/templates/android_release.apk ~/.local/share/godot/export_templates/4.4.stable/android_release.apk
          echo "Export templates installed"

      - name: Generate Godot editor settings (with Xvfb)
        run: |
          mkdir -p ~/.config/godot
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2
          DISPLAY=:99 timeout 30 ./godot --editor --quit 2>/dev/null || true
          kill %1 2>/dev/null || true
          SETTINGS=~/.config/godot/editor_settings-4.4.tres
          if [ -f "$SETTINGS" ]; then
            sed -i "s|export/android/android_sdk_path = \".*\"|export/android/android_sdk_path = \"$ANDROID_HOME\"|" $SETTINGS
            sed -i "s|export/android/java_sdk_path = \".*\"|export/android/java_sdk_path = \"$JAVA_HOME\"|" $SETTINGS
            echo "Updated editor settings:"
            grep "android_sdk_path\|java_sdk_path" $SETTINGS
          else
            echo "ERROR: editor settings not generated"
            exit 1
          fi

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkey -v -keystore ~/.local/share/godot/keystores/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Export APK
        run: |
          ./godot --headless --export-release "Android" FPSProject.apk 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FPSProject-APK
          path: FPSProject.apk
