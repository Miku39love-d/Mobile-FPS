name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Download Godot 4.4 Engine
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip -q Godot_v4.4-stable_linux.x86_64.zip
          mv Godot_v4.4* /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.4.stable
          cd ~/.local/share/godot/export_templates/4.4.stable
          unzip -o $GITHUB_WORKSPACE/Godot_v4.4-stable_export_templates.tpz
          ls -la

      - name: Configure Godot Editor Settings
        run: |
          mkdir -p ~/.config/godot
          echo '[gd_resource type="EditorSettings" format=3]' > ~/.config/godot/editor_settings-4.4.tres
          echo '' >> ~/.config/godot/editor_settings-4.4.tres
          echo '[resource]' >> ~/.config/godot/editor_settings-4.4.tres
          echo 'export/android/android_sdk_path = "'$ANDROID_HOME'"' >> ~/.config/godot/editor_settings-4.4.tres
          echo 'export/android/java_sdk_path = "'$JAVA_HOME'"' >> ~/.config/godot/editor_settings-4.4.tres
          echo 'export/android/debug_keystore = "'$HOME'/.local/share/godot/keystores/debug.keystore"' >> ~/.config/godot/editor_settings-4.4.tres
          echo 'export/android/debug_keystore_pass = "android"' >> ~/.config/godot/editor_settings-4.4.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> ~/.config/godot/editor_settings-4.4.tres
          cat ~/.config/godot/editor_settings-4.4.tres

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkeypair -alias androiddebugkey -keypass android -keystore ~/.local/share/godot/keystores/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Install Android build template
        run: |
          mkdir -p android/plugins
          echo "4.4.stable" > android/.build_version
          mkdir -p android/build
          unzip -o ~/.local/share/godot/export_templates/4.4.stable/android_source.zip -d android/build/
          ls android/
          echo "==="
          ls android/build/ | head -10

      - name: Import project assets
        run: |
          godot --headless --path . --import 2>&1 || true

      - name: Export Android APK
        run: |
          godot --headless --path . --export-release "Android" FPSProject.apk 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FPSProject-APK
          path: FPSProject.apk
